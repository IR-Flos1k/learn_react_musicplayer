name: Musicfun Deploy

on:
  push: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jonbs: 
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        width:
          node-version: 20
      - run: npm install
      - tun: npm run build
      - uses: actions/upload-pages-artifact@v3
        width:
          path: dist
      - uses: actions/deploy-pages@v4